# bookstore-scraper 服務設定

server:
  host: "0.0.0.0"
  port: 8101

scraper:
  # 預設 TLS 指紋偽造的瀏覽器版本
  # 可選: chrome116, chrome120, chrome123, chrome124, chrome131, chrome136 等
  impersonate: "chrome136"
  # 預設請求逾時 (秒)
  timeout: 30
  # 同一 domain 最小請求間隔（秒），防止被 WAF rate limit
  rate_limit_interval: 1.0

session:
  # Session 閒置自動過期時間 (秒)
  ttl: 300

browser:
  # 瀏覽器引擎: "playwright" (Playwright), "undetected" (undetected-chromedriver, 可過 Turnstile)
  engine: "undetected"
  # 同時最多開幾個 tab（防止 CPU/RAM 暴漲）
  max_tabs: 3
  # 瀏覽器閒置多久自動關閉（秒）
  idle_timeout: 300
  # Cloudflare challenge 等待逾時（秒）
  challenge_timeout: 15
  # headless 模式: true (無視窗), false (需搭配 Xvfb，可過 CF Turnstile)
  headless: false
  # 瀏覽器引擎（Playwright 用）: "chrome", "chromium", "auto"
  channel: "auto"
