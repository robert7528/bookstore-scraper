# bookstore-scraper 服務設定

server:
  host: "0.0.0.0"
  port: 8101

scraper:
  # TLS 指紋偽造的瀏覽器版本: "auto" (自動偵測系統 Chrome 版本), 或指定如 "chrome136"
  impersonate: "auto"
  # 預設請求逾時 (秒)
  timeout: 30
  # 同一 domain 最小請求間隔（秒），防止被 WAF rate limit
  rate_limit_interval: 0.5

session:
  # Session 閒置自動過期時間 (秒)
  ttl: 300

browser:
  # 瀏覽器引擎: "playwright" (Playwright), "undetected" (undetected-chromedriver, 可過 Turnstile)
  engine: "undetected"
  # 同時最多開幾個 tab（Playwright engine 用，undetected engine 無效）
  max_tabs: 3
  # 同時最多幾個 browser 請求（undetected engine 用）
  # 目前僅支援 1（單一 Chrome 進程 + 單一 tab，序列處理）
  # TODO: 支援 >1 需改架構為每個 worker 一個 Chrome 進程
  max_workers: 1
  # 瀏覽器閒置多久自動關閉（秒）
  idle_timeout: 300
  # 瀏覽器最長存活時間（秒），到期強制重啟，防止記憶體洩漏。0=不限制
  max_lifetime: 7200
  # Cloudflare challenge 等待逾時（秒）
  challenge_timeout: 15
  # headless 模式:
  #   Linux:   false (需搭配 Xvfb，可過 CF Turnstile) | true (省資源但過不了 Turnstile)
  #   Windows: false (有桌面環境，直接可用) | true (service 模式下可能需要)
  headless: false
  # 瀏覽器引擎（Playwright 用）: "chrome", "chromium", "auto"
  channel: "auto"

# Forward proxy（HyProxy 介接用）
proxy:
  enabled: false
  host: "0.0.0.0"
  port: 8102
  # 自簽憑證（CONNECT MitM 用，不存在時自動產生）
  cert_file: "configs/proxy-cert.pem"
  key_file: "configs/proxy-key.pem"
  # 不需要 MitM 的 domain（走透明轉發，保持 HyProxy 原始 TLS/cookie）
  # 預設所有 CONNECT 都走 MitM + curl_cffi（繞過 CF TLS 偵測）
  # 只有這裡列的 domain 走透明轉發（適用於 MitM 會造成問題的 domain）
  transparent_domains: []
